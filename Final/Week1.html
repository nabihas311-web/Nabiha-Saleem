<!DOCTYPE html>
<html>
<head>
<title>Modern House Scene</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#dff6ff;
}

.canvas{
    width:700px;
    height:450px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(to top, #87ceeb 70%, #ffffff);
    border:3px solid #444;
}

/* Sun */
.sun{
    width:80px;
    height:80px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:30px;
    right:40px;
    box-shadow:0 0 30px yellow;
}


/* Ground */
.ground{
    width:100%;
    height:130px;
    background:#3cb371;
    position:absolute;
    bottom:0;
}

/* House */
.house{
    width:180px;
    height:140px;
    background:#f4a460;
    position:absolute;
    bottom:130px;
    left:250px;
    border:3px solid #333;
}

/* Roof */
.roof{
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:90px solid #8b0000;
    position:absolute;
    bottom:270px;
    left:230px;
}

/* Door */
.door{
    width:40px;
    height:75px;
    background:#5c4033;
    position:absolute;
    bottom:130px;
    left:320px;
    border-radius:5px;
}

/* Door Knob */
.knob{
    width:8px;
    height:8px;
    background:gold;
    border-radius:50%;
    position:absolute;
    bottom:165px;
    left:350px;
}

/* Windows */
.window{
    width:35px;
    height:35px;
    background:#e0ffff;
    border:3px solid #333;
    position:absolute;
}

.window1{
    bottom:200px;
    left:275px;
}

.window2{
    bottom:200px;
    left:370px;
}
   
</style>
</head>

<body>

<div class="canvas">

    <div class="sun"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="ground"></div>

    <div class="roof"></div>
    <div class="house"></div>

    <div class="door"></div>
    <div class="knob"></div>

    <div class="window window1"></div>
    <div class="window window2"></div>

    <div class="tree-trunk"></div>
    <div class="tree-leaves"></div>

    <div class="path"></div>

</div>

</body>
</html>
